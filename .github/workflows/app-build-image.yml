name: Build Custom ERPNext Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image Tag (e.g., v16)'
        required: true
        default: 'v16'
        type: string
      apps_json_base64:
        description: 'Base64 encoded apps.json'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode apps.json
        run: |
          echo "${{ inputs.apps_json_base64 }}" | base64 -d > apps.json

      - name: Build and push Custom Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/custom/Containerfile
          push: true
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            PYTHON_VERSION=3.11.9
            NODE_VERSION=18.20.2
          secrets: |
            id=apps_json,src=apps.json
          tags: ghcr.io/${{ github.repository_owner }}/erpnext-custom:${{ inputs.image_tag }}
