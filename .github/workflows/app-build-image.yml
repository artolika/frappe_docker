name: Build Custom ERPNext Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image Tag (e.g., v16)'
        required: true
        default: 'v16'
        type: string
      apps_json_base64:
        description: 'Base64 encoded apps.json'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Aggressive)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Safely Create 6GB Swap File
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 6G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Checkout Official Frappe Docker Repository
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode apps.json
        run: |
          echo "${{ inputs.apps_json_base64 }}" | base64 -d > apps.json

      - name: Build and push Custom Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/layered/Containerfile
          push: true
          build-args: |
            FRAPPE_IMAGE_PREFIX=frappe
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            PYTHON_VERSION=3.11.9
            NODE_VERSION=18.20.2
          secret-files: |
            apps_json=./apps.json
          tags: ghcr.io/${{ github.repository_owner }}/erpnext-custom:${{ inputs.image_tag }}
